services:
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./front/hanzi-lookup-system/build:/usr/share/nginx/html
      - ./front/hanzi-lookup-system/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:rw
    env_file:
      - ./back/.env
    environment:
      - DEFAULT_DB_PATH=/app/data/dictionary.db
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    user: "1000:1000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  frontend_build:
    driver: local
    driver_opts:
      type: none
      device: ./front/hanzi-lookup-system/build
      o: bind

networks:
  app-network:
    driver: bridge
